# eMMC Coredump Test Configuration

# CONFIG_TEST=y
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y


# Select eMMC backend
CONFIG_DEBUG_COREDUMP_BACKEND_EMMC=y
CONFIG_DEBUG_COREDUMP_EMMC_RESERVE_SIZE=0x100000
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_MMC=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# Enable shell for debugging
CONFIG_SHELL=y
CONFIG_DEBUG_COREDUMP_SHELL=y
CONFIG_MAIN_STACK_SIZE=4000

# Stack protection
CONFIG_TEST_HW_STACK_PROTECTION=n