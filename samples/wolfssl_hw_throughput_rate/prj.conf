
# Kernel options
CONFIG_MAIN_STACK_SIZE=20480
CONFIG_ENTROPY_GENERATOR=y
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=204800

# Timing API for throughput measurement (timing_counter_get / timing_cycles_get)
CONFIG_TIMING_FUNCTIONS=y
# TLS configuration
CONFIG_WOLFSSL=y
CONFIG_WOLFSSL_BUILTIN=y
CONFIG_WOLFSSL_SETTINGS_FILE="wolfssl_user_settings_nofs.h"

CONFIG_WOLFSSL_TLS_VERSION_1_2=y
CONFIG_WOLFSSL_KEY_EXCHANGE_ALL_ENABLED=y
CONFIG_WOLFSSL_CIPHER_ALL_ENABLED=y
CONFIG_WOLFSSL_MAC_ALL_ENABLED=y
CONFIG_WOLFSSL_HMAC_DRBG_ENABLED=y



# Pthreads
CONFIG_PTHREAD_IPC=y

# Clock for time()
CONFIG_POSIX_CLOCK=n

# Network driver config
CONFIG_NETWORKING=n
# CONFIG_GPIO=n


CONFIG_TEST_RANDOM_GENERATOR=y
#linkedsemi hardware encryption
CONFIG_WOLFSSL_LINKEDSEMI_HARDWARE_AES_ALT=y
CONFIG_RISCV_PMP=y