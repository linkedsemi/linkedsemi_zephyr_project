CONFIG_PRINTK=y
# CONFIG_LOG=y
# CONFIG_LOG_MODE_IMMEDIATE=y
# CONFIG_LOG_BUFFER_SIZE=65536
# CONFIG_LOG_THREAD_ID_PREFIX=y
CONFIG_FLASH=y
CONFIG_SPI=y

# UART4 interrupt storm for nested IRQ stress test
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Watchdog periodic IRQ source for multi-level nesting stress test
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n
# SMP configuration
CONFIG_SCHED_CPU_MASK=y
CONFIG_IPI_OPTIMIZE=y
CONFIG_BUILD_OUTPUT_HEX=y
CONFIG_SHELL=y
CONFIG_IRQ_NESTED=y
CONFIG_LOG_BACKEND_UART=y
# CONFIG_SHELL_LOG_LEVEL_DBG=y
# CONFIG_SHELL_BACKEND_SERIAL_INIT_PRIORITY=1
# CONFIG_SHELL_BACKEND_SERIAL_LOG_MESSAGE_QUEUE_SIZE=20480
# CONFIG_SHELL_BACKEND_SERIAL_LOG_MESSAGE_QUEUE_TIMEOUT=10000


CONFIG_LOG=y


# CTF + UART tracing backend (方案 B)
CONFIG_TRACING=n
CONFIG_TRACING_CTF=y
CONFIG_TRACING_BACKEND_UART=y

# 同步输出：每个 tracing 事件立即从 UART 吐出，不经过 ring buffer。
# 调试 SMP 卡死/崩溃时必须用同步，否则异步 buffer 里的数据可能来不及刷出来。
# 代价：每次事件都调用 uart_poll_out，会对业务线程产生明显延迟。
CONFIG_TRACING_SYNC=y
# CONFIG_TRACING_ASYNC=y

# 同步模式下 buffer 用于格式化单个 packet，保持足够大即可
CONFIG_TRACING_BUFFER_SIZE=256
CONFIG_TRACING_PACKET_MAX_SIZE=64

# 详细跟踪：线程、中断、同步原语、Work queue，用于定位 SMP XIP flash 竞争
CONFIG_TRACING_THREAD=y
CONFIG_TRACING_ISR=y
CONFIG_TRACING_WORK=y
CONFIG_TRACING_SYSCALL=n
CONFIG_TRACING_SEMAPHORE=y
CONFIG_TRACING_MUTEX=y
CONFIG_TRACING_CONDVAR=n
CONFIG_TRACING_QUEUE=y
CONFIG_TRACING_FIFO=n
CONFIG_TRACING_LIFO=n
CONFIG_TRACING_STACK=n
CONFIG_TRACING_MESSAGE_QUEUE=n
CONFIG_TRACING_MAILBOX=n
CONFIG_TRACING_PIPE=n
CONFIG_TRACING_HEAP=n
CONFIG_TRACING_MEMORY_SLAB=n
CONFIG_TRACING_TIMER=n
CONFIG_TRACING_EVENT=n
CONFIG_TRACING_POLLING=n
CONFIG_TRACING_PM=n
CONFIG_TRACING_NETWORKING=n
CONFIG_TRACING_NET_SOCKETS=n
CONFIG_TRACING_NET_CORE=n

# 线程运行时统计（无 shell 时也可通过 tracing 数据间接分析）
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ANALYSIS=y
CONFIG_SCHED_THREAD_USAGE_AUTO_ENABLE=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_RUNTIME_STATS_USE_TIMING_FUNCTIONS=y